services:
  oncoscopr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    expose:
      - "3838"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - oncoscopr

volumes:
  caddy_data: {}
  caddy_config: {}
