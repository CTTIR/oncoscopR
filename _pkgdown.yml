url: https://cttir.github.io/zhncommandR/

template:
  package: themakR
  light-switch: true

development:
  mode: auto

home:
  title: zhncommandR — auditor dashboard for haematological oncology cohorts
  description: >
    Reads tumour-documentation spreadsheets, computes quality and coverage
    indicators, OPS-8-544 and OPS-1-941 counting, Kaplan-Meier analyses,
    oncoprint and cytogenetics summaries. Ships an interactive Shiny
    dashboard and a synthetic example cohort.

navbar:
  structure:
    left:  [reference, articles, news]
    right: [search, github, lightswitch]

reference:
  - title: Launch the dashboard
    contents:
      - zhn_run_app
      - zhn_example_path
  - title: Readers
    desc: Read tumour-documentation Excel sheets.
    contents:
      - zhn_read_cohort
      - zhn_read_therapy
      - zhn_read_diagnostics
      - zhn_read_tumorboard
  - title: Parsers
    desc: Reshape and classify the raw sheets for downstream analysis.
    contents:
      - zhn_prepare_therapy_blocks
      - zhn_prepare_diagnostic_blocks
      - zhn_parse_oncoprint
      - zhn_parse_cytogenetics
  - title: Alteration classification helpers
    contents:
      - zhn_normalize_alteration
      - zhn_alteration_type
      - zhn_is_mutation
  - title: S3 classes
    desc: Constructors for the data-frame wrappers returned by readers and parsers.
    contents:
      - new_cohort_df
      - new_therapy_blocks
      - new_diagnostic_blocks
  - title: Figures
    desc: Publication-ready figures in the Hugo Coder look.
    contents:
      - zhn_plot_diagnoses
      - zhn_plot_cases_by_year
      - zhn_plot_km
      - zhn_km_pairwise
      - zhn_theme
      - zhn_pal
  - title: Export and fonts
    desc: Save figures to paper-ready files and register the bundled font.
    contents:
      - zhn_save_plot
      - zhn_register_fonts

articles:
  - title: Articles
    navbar: ~
    contents:
      - zhncommandR
      - figures-and-tables
      - shiny-app
