<svg xmlns="http://www.w3.org/2000/svg" width="500" height="580" viewBox="0 0 500 580"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><defs>
    <linearGradient id="bgonco" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#1a0d24"></stop>
      <stop offset="100%" stop-color="#0c0612"></stop>
    </linearGradient>
    <!-- Iris lens glow -->
    <radialGradient id="irisGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C879E6" stop-opacity="0.18"></stop>
      <stop offset="70%" stop-color="#5E2C8E" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#5E2C8E" stop-opacity="0"></stop>
    </radialGradient>
    <!-- Lens fill -->
    <radialGradient id="lensFill" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#2a1540" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#160a22" stop-opacity="0.15"></stop>
    </radialGradient>
    <clipPath id="hexonco">
      <polygon points="250,30 455,145 455,375 250,490 45,375 45,145"></polygon>
    </clipPath>
    <!-- Clip for points inside the lens (magnified view) -->
    <clipPath id="lensClip">
      <circle cx="250" cy="280" r="92"></circle>
    </clipPath>
  </defs><polygon points="250,30 455,145 455,375 250,490 45,375 45,145" fill="url(#bgonco)"></polygon><g clip-path="url(#hexonco)">

    <!-- ════════════════════════════════════════════════════════ -->
    <!-- PATIENT COHORT CLUSTER — dots across the whole hex      -->
    <!-- Outside-lens dots are dimmer/smaller (unfocused)        -->
    <!-- ════════════════════════════════════════════════════════ -->

    <!-- Scattered cohort dots (background, outside scope) -->
    <circle cx="110" cy="180" r="2.5" fill="#5E2C8E" opacity="0.45"></circle>
    <circle cx="140" cy="160" r="2" fill="#7C3AED" opacity="0.4"></circle>
    <circle cx="175" cy="195" r="2.2" fill="#5E2C8E" opacity="0.42"></circle>
    <circle cx="95" cy="220" r="2" fill="#A64DC8" opacity="0.4"></circle>
    <circle cx="130" cy="240" r="2.4" fill="#5E2C8E" opacity="0.45"></circle>
    <circle cx="160" cy="225" r="1.8" fill="#7C3AED" opacity="0.38"></circle>
    <circle cx="100" cy="270" r="2.2" fill="#5E2C8E" opacity="0.4"></circle>
    <circle cx="350" cy="170" r="2.4" fill="#7C3AED" opacity="0.42"></circle>
    <circle cx="380" cy="195" r="2" fill="#5E2C8E" opacity="0.4"></circle>
    <circle cx="345" cy="215" r="2.2" fill="#A64DC8" opacity="0.42"></circle>
    <circle cx="400" cy="225" r="1.8" fill="#5E2C8E" opacity="0.38"></circle>
    <circle cx="370" cy="250" r="2.4" fill="#7C3AED" opacity="0.42"></circle>
    <circle cx="405" cy="260" r="2" fill="#5E2C8E" opacity="0.4"></circle>
    <circle cx="120" cy="370" r="2.2" fill="#5E2C8E" opacity="0.42"></circle>
    <circle cx="155" cy="390" r="2" fill="#7C3AED" opacity="0.4"></circle>
    <circle cx="180" cy="365" r="2.4" fill="#A64DC8" opacity="0.42"></circle>
    <circle cx="110" cy="400" r="1.8" fill="#5E2C8E" opacity="0.38"></circle>
    <circle cx="340" cy="375" r="2.2" fill="#5E2C8E" opacity="0.42"></circle>
    <circle cx="370" cy="395" r="2" fill="#7C3AED" opacity="0.4"></circle>
    <circle cx="395" cy="370" r="2.4" fill="#5E2C8E" opacity="0.42"></circle>
    <circle cx="355" cy="410" r="1.8" fill="#A64DC8" opacity="0.38"></circle>
    <circle cx="250" cy="410" r="2.2" fill="#5E2C8E" opacity="0.4"></circle>
    <circle cx="220" cy="400" r="1.8" fill="#7C3AED" opacity="0.38"></circle>
    <circle cx="285" cy="405" r="2" fill="#5E2C8E" opacity="0.4"></circle>

    <!-- ════════════════════════════════════════════════════════ -->
    <!-- IRIS GLOW behind lens                                   -->
    <!-- ════════════════════════════════════════════════════════ -->
    <circle cx="250" cy="280" r="120" fill="url(#irisGlow)"></circle>

    <!-- ════════════════════════════════════════════════════════ -->
    <!-- MAGNIFIED COHORT — brighter, larger dots inside lens    -->
    <!-- Clipped to the lens circle                              -->
    <!-- ════════════════════════════════════════════════════════ -->
    <g clip-path="url(#lensClip)">
      <!-- Lens inner fill -->
      <circle cx="250" cy="280" r="92" fill="url(#lensFill)"></circle>

      <!-- Magnified patient dots — the focal cohort -->
      <circle cx="218" cy="248" r="4.5" fill="#C879E6" opacity="0.92"></circle>
      <circle cx="245" cy="235" r="4" fill="#A64DC8" opacity="0.9"></circle>
      <circle cx="275" cy="250" r="4.5" fill="#C879E6" opacity="0.9"></circle>
      <circle cx="300" cy="240" r="3.8" fill="#7C3AED" opacity="0.85"></circle>
      <circle cx="205" cy="278" r="4" fill="#A64DC8" opacity="0.9"></circle>
      <circle cx="235" cy="272" r="5" fill="#E0A8F0" opacity="0.95"></circle>
      <circle cx="262" cy="282" r="4.2" fill="#C879E6" opacity="0.92"></circle>
      <circle cx="292" cy="275" r="4" fill="#A64DC8" opacity="0.88"></circle>
      <circle cx="218" cy="305" r="4.2" fill="#C879E6" opacity="0.9"></circle>
      <circle cx="248" cy="312" r="4.5" fill="#A64DC8" opacity="0.9"></circle>
      <circle cx="278" cy="308" r="4" fill="#C879E6" opacity="0.88"></circle>
      <circle cx="305" cy="300" r="3.6" fill="#7C3AED" opacity="0.85"></circle>
      <circle cx="195" cy="252" r="3.5" fill="#7C3AED" opacity="0.82"></circle>
      <circle cx="225" cy="330" r="3.6" fill="#A64DC8" opacity="0.85"></circle>
      <circle cx="285" cy="328" r="3.4" fill="#C879E6" opacity="0.85"></circle>
      <circle cx="308" cy="262" r="3.4" fill="#A64DC8" opacity="0.82"></circle>
      <circle cx="190" cy="295" r="3.4" fill="#C879E6" opacity="0.82"></circle>

      <!-- A few semantic links between focal patients -->
      <line x1="235" y1="272" x2="262" y2="282" stroke="#C879E6" stroke-width="0.6" opacity="0.4"></line>
      <line x1="235" y1="272" x2="245" y2="235" stroke="#C879E6" stroke-width="0.6" opacity="0.35"></line>
      <line x1="262" y1="282" x2="248" y2="312" stroke="#C879E6" stroke-width="0.6" opacity="0.35"></line>
      <line x1="218" y1="248" x2="235" y2="272" stroke="#A64DC8" stroke-width="0.5" opacity="0.3"></line>
      <line x1="275" y1="250" x2="292" y2="275" stroke="#A64DC8" stroke-width="0.5" opacity="0.3"></line>
      <line x1="248" y1="312" x2="278" y2="308" stroke="#A64DC8" stroke-width="0.5" opacity="0.28"></line>

      <!-- One highlighted "index case" — brighter with halo -->
      <circle cx="250" cy="280" r="9" fill="#5E2C8E" opacity="0.25"></circle>
      <circle cx="250" cy="280" r="5.5" fill="#E0A8F0" opacity="0.98"></circle>
      <circle cx="250" cy="280" r="2" fill="#ffffff" opacity="0.85"></circle>
    </g>

    <!-- ════════════════════════════════════════════════════════ -->
    <!-- LENS RING — the scope itself                            -->
    <!-- ════════════════════════════════════════════════════════ -->
    <!-- Outer ring -->
    <circle cx="250" cy="280" r="92" fill="none" stroke="#C879E6" stroke-width="4.5" opacity="0.95"></circle>
    <!-- Inner bevel ring -->
    <circle cx="250" cy="280" r="86" fill="none" stroke="#5E2C8E" stroke-width="1.5" opacity="0.6"></circle>
    <!-- Specular highlight arc (top-left of lens) -->
    <path d="M 192,232 A 86 86 0 0 1 250,194" fill="none" stroke="#E0A8F0" stroke-width="2" opacity="0.5" stroke-linecap="round"></path>

    <!-- ════════════════════════════════════════════════════════ -->
    <!-- CROSSHAIR / RETICLE — across the lens                   -->
    <!-- ════════════════════════════════════════════════════════ -->
    <!-- Horizontal -->
    <line x1="170" y1="280" x2="222" y2="280" stroke="#C879E6" stroke-width="1.2" opacity="0.55"></line>
    <line x1="278" y1="280" x2="330" y2="280" stroke="#C879E6" stroke-width="1.2" opacity="0.55"></line>
    <!-- Vertical -->
    <line x1="250" y1="200" x2="250" y2="252" stroke="#C879E6" stroke-width="1.2" opacity="0.55"></line>
    <line x1="250" y1="308" x2="250" y2="360" stroke="#C879E6" stroke-width="1.2" opacity="0.55"></line>
    <!-- Tick marks on crosshair -->
    <line x1="185" y1="277" x2="185" y2="283" stroke="#C879E6" stroke-width="1" opacity="0.45"></line>
    <line x1="315" y1="277" x2="315" y2="283" stroke="#C879E6" stroke-width="1" opacity="0.45"></line>
    <line x1="247" y1="215" x2="253" y2="215" stroke="#C879E6" stroke-width="1" opacity="0.45"></line>
    <line x1="247" y1="345" x2="253" y2="345" stroke="#C879E6" stroke-width="1" opacity="0.45"></line>

    <!-- ════════════════════════════════════════════════════════ -->
    <!-- SCOPE HANDLE — extends to lower-right (magnifier grip)  -->
    <!-- ════════════════════════════════════════════════════════ -->
    <line x1="315" y1="345" x2="368" y2="398" stroke="#C879E6" stroke-width="9" stroke-linecap="round" opacity="0.92"></line>
    <line x1="315" y1="345" x2="368" y2="398" stroke="#5E2C8E" stroke-width="3.5" stroke-linecap="round" opacity="0.7"></line>

    <!-- ════════════════════════════════════════════════════════ -->
    <!-- COHORT COUNT BADGE — small annotation top-left         -->
    <!-- ════════════════════════════════════════════════════════ -->
    <text font-family="monospace" font-size="9" fill="#C879E6" opacity="0.6" text-anchor="start" x="92" y="320">n = cohort</text>
    <line x1="92" y1="305" x2="148" y2="305" stroke="#5E2C8E" stroke-width="0.6" opacity="0.4"></line>

  </g><polygon points="250,30 455,145 455,375 250,490 45,375 45,145" fill="none" stroke="#C879E6" stroke-width="11" stroke-linejoin="round"></polygon><polygon points="250,44 441,153 441,367 250,476 59,367 59,153" fill="none" stroke="#A64DC8" stroke-width="1.5" stroke-linejoin="round" opacity="0.6"></polygon></svg>